version: '3.8'

services:
  # Odoo Application Service
  school_web:
    container_name: school_management_app
    build:
      context: .
      dockerfile: Dockerfile
    image: odoo18-school-custom:1.0
    depends_on:
      school_db:
        condition: service_healthy
    ports:
      - "8070:8069" # Maps host port 8070 to container Odoo web port 8069
    volumes:
      # Mount the module root directory directly into Odoo extra-addons
      - .:/mnt/extra-addons/school_management
      - ./config:/etc/odoo
    environment:
      - HOST=school_db
      - USER=odoo
      - PASSWORD=odoo_secure_db_pass
    restart: unless-stopped

  # PostgreSQL Database Service
  school_db:
    container_name: school_management_db
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo_secure_db_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: